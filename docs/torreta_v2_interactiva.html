<!DOCTYPE html>
<!--
  Torreta V2 — prototipo 3D interactivo (calidad de presentación)
  UTN FRSR · Electiva Arduino · TFI 2026

  Producto modelado proceduralmente con Three.js a MEDIDAS REALES (mm).
  Doble clic para abrir (requiere internet: Three.js desde CDN).
  Controles: arrastrar = orbitar · rueda = zoom · M = modo demo · click = inspeccionar pieza.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Torreta V2 — prototipo interactivo</title>
<style>
  :root { --acento: #ffb547; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
  body { background: radial-gradient(120% 95% at 50% 12%, #353e49 0%, #171b21 52%, #07090c 100%); }
  canvas { display: block; }
  #titulo {
    position: fixed; top: 16px; left: 22px; z-index: 10; color: #e8eaed;
    pointer-events: none; letter-spacing: 3px;
  }
  #titulo h1 { margin: 0; font-size: 18px; } #titulo h1 b { color: var(--acento); }
  #titulo span { font-size: 11px; color: #9aa0a6; letter-spacing: 1.5px; }
  #panel {
    position: fixed; top: 16px; right: 16px; z-index: 10; width: 224px;
    background: rgba(16,19,24,.82); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
    color: #dfe3e8; font-size: 12.5px; padding: 14px 16px;
  }
  #panel label { display: block; margin: 10px 0 4px; color: #9aa0a6; font-size: 11px;
                 letter-spacing: 1px; text-transform: uppercase; }
  #panel input[type=range] { width: 100%; accent-color: var(--acento); }
  #panel button {
    width: 100%; margin-top: 8px; padding: 7px; border: 1px solid rgba(255,255,255,.16);
    border-radius: 8px; background: rgba(255,255,255,.05); color: #dfe3e8;
    font-size: 12px; cursor: pointer; transition: all .15s;
  }
  #panel button:hover { border-color: var(--acento); color: var(--acento); }
  #panel button.on { background: var(--acento); border-color: var(--acento);
                     color: #14171c; font-weight: 700; }
  #variantes { display: flex; gap: 8px; margin-top: 4px; }
  #variantes div {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid rgba(255,255,255,.25); transition: transform .12s;
  }
  #variantes div:hover { transform: scale(1.15); }
  #variantes div.on { border-color: var(--acento); }
  #info {
    position: fixed; left: 22px; bottom: 54px; z-index: 10; max-width: 320px;
    background: rgba(16,19,24,.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,181,71,.45); border-left: 3px solid var(--acento);
    border-radius: 10px; color: #e8eaed; padding: 12px 16px; display: none;
  }
  #info h2 { margin: 0 0 5px; font-size: 14px; color: var(--acento); }
  #info p { margin: 0; font-size: 12.5px; line-height: 1.45; color: #c5cad1; }
  #ayuda {
    position: fixed; bottom: 14px; left: 0; right: 0; z-index: 9; text-align: center;
    color: #7c828a; font-size: 11.5px; letter-spacing: .6px; pointer-events: none;
  }
  #ayuda b { color: #aab0b8; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="titulo">
  <h1>TORRETA <b>V2</b> · PROTOTIPO</h1>
  <span>COMPONENTES A MEDIDAS REALES · TFI ARDUINO UTN FRSR 2026</span>
</div>

<div id="panel">
  <label>Vista explotada</label>
  <input id="sExplotar" type="range" min="0" max="100" value="0">
  <label>Acabado de la estructura</label>
  <div id="variantes">
    <div data-c="#2b3036" style="background:#2b3036" class="on"></div>
    <div data-c="#d8dbde" style="background:#d8dbde"></div>
    <div data-c="#4a5440" style="background:#4a5440"></div>
    <div data-c="#7a2e2e" style="background:#7a2e2e"></div>
  </div>
  <button id="bDemo">▶ Modo demo (M)</button>
  <button id="bRotar" class="on">⟳ Auto-rotación</button>
  <button id="bReset">⌂ Reset de cámara</button>
</div>

<div id="info"><h2 id="infoNombre"></h2><p id="infoDesc"></p></div>
<div id="ayuda"><b>Arrastrar</b> orbitar · <b>Rueda</b> zoom · <b>Click</b> inspeccionar pieza · <b>M</b> demo · <b>Esc</b> deseleccionar</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ============================ RENDERER / ESCENA =============================
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
document.body.appendChild(renderer.domElement);

const escena = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
escena.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camara = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 1, 5000);
const CAM0 = { pos: new THREE.Vector3(255, 175, 305), tgt: new THREE.Vector3(0, 82, 10) };
camara.position.copy(CAM0.pos);

const controles = new OrbitControls(camara, renderer.domElement);
controles.target.copy(CAM0.tgt);
controles.enableDamping = true;
controles.dampingFactor = 0.06;
controles.autoRotate = true;
controles.autoRotateSpeed = 0.9;
controles.maxPolarAngle = Math.PI * 0.495;
controles.minDistance = 90; controles.maxDistance = 900;

// ============================== MATERIALES PBR ==============================
const matGrafito = new THREE.MeshPhysicalMaterial({ color: 0x2b3036, roughness: .42,
  metalness: .05, clearcoat: .45, clearcoatRoughness: .25 });
const matPanel  = new THREE.MeshPhysicalMaterial({ color: 0x1d2126, roughness: .5,
  metalness: .05, clearcoat: .2 });
const matAlu    = new THREE.MeshStandardMaterial({ color: 0xd4d9dd, roughness: .3, metalness: 1 });
const matAcero  = new THREE.MeshStandardMaterial({ color: 0xc8cdd2, roughness: .22, metalness: 1 });
const matLaton  = new THREE.MeshStandardMaterial({ color: 0xc9a44a, roughness: .28, metalness: 1 });
const matAmbar  = new THREE.MeshPhysicalMaterial({ color: 0xffb547, roughness: .3,
  clearcoat: .6, emissive: 0xffb547, emissiveIntensity: .18 });
const matLed    = new THREE.MeshStandardMaterial({ color: 0xffb547, emissive: 0xffb547,
  emissiveIntensity: 2.4 });
const matLcd    = new THREE.MeshStandardMaterial({ color: 0x9ad65a, emissive: 0x9ad65a,
  emissiveIntensity: 1.1 });
const pcb = c => new THREE.MeshPhysicalMaterial({ color: c, roughness: .48,
  clearcoat: .55, clearcoatRoughness: .12 });
const matPcbAzul = pcb(0x1660a8), matPcbVerde = pcb(0x1f6b34), matPcbRojo = pcb(0xa4252b),
      matPcbViol = pcb(0x5435a0), matPcbEsp = pcb(0x15314f);
const matLente  = new THREE.MeshPhysicalMaterial({ color: 0x10151b, roughness: .06,
  metalness: 0, transmission: .85, ior: 1.45, thickness: 2, clearcoat: 1 });
const matServo  = new THREE.MeshPhysicalMaterial({ color: 0x2a6fd6, roughness: .45, clearcoat: .25 });
const matCrema  = new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: .55 });
const matBlanco = new THREE.MeshStandardMaterial({ color: 0xededed, roughness: .5 });
const matChip   = new THREE.MeshPhysicalMaterial({ color: 0x16191d, roughness: .35,
  metalness: .3, clearcoat: .3 });
const matMalla  = new THREE.MeshStandardMaterial({ color: 0x3c4146, roughness: .85 });
const matHaz    = new THREE.MeshBasicMaterial({ color: 0xff2030, transparent: true,
  opacity: .85, toneMapped: false });

// ========================= HELPERS DE CONSTRUCCIÓN ==========================
function M(geo, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  m.castShadow = m.receiveShadow = true;
  return m;
}
const box  = (w, h, d, r = 0) => r > 0 ? new RoundedBoxGeometry(w, h, d, 4, r)
                                       : new THREE.BoxGeometry(w, h, d);
const cil  = (r, h, s = 40) => new THREE.CylinderGeometry(r, r, h, s);
const tubo = (r, h, s = 40) => new THREE.CylinderGeometry(r, r, h, s, 1, true);

function grupo(nombre, desc, padre) {
  const g = new THREE.Group();
  g.name = nombre;
  g.userData = { nombre, desc, explotable: true };
  padre.add(g);
  return g;
}

// =============================== buildProduct ===============================
// Coordenadas: Y arriba, +Z = frente (boca del cañón). Unidades: mm.
const torreta = new THREE.Group();
escena.add(torreta);
const grupoPan = new THREE.Group();   // azimut
const grupoTilt = new THREE.Group();  // elevación (pivote a y=118)
grupoTilt.position.y = 118;

function buildProduct() {
  // ---------------- grupoBase ----------------
  const gPlaca = grupo('Placa inferior', 'Chasis open-frame de 130×130 mm: toda la electrónica de control queda a la vista, como en el prototipo real.', torreta);
  gPlaca.add(M(box(130, 6, 130, 2.5), matGrafito, 0, 3, 0));

  const gSeps = grupo('Separadores', 'Separadores de aluminio Ø8×42 mm: elevan la placa estatórica y dejan visible el nivel de electrónica.', torreta);
  for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
    gSeps.add(M(cil(4, 42), matAlu, 48 * sx, 27, 48 * sz));
    gSeps.add(M(cil(5.5, 1.6, 6), matAlu, 48 * sx, 6.8, 48 * sz));
  }

  const gEstator = grupo('Placa estatórica', 'Plataforma fija Ø100: el 28BYJ-48 cuelga debajo y su eje la atraviesa para mover la plataforma de azimut.', torreta);
  gEstator.add(M(cil(50, 6, 64), matGrafito, 0, 51, 0));

  const gStepper = grupo('Motor 28BYJ-48', 'Paso a paso unipolar, medidas reales Ø28×19 mm, brida con agujeros a 35 mm. Mueve el azimut en un sector de ±180°; la posición se conoce contando pasos.', torreta);
  gStepper.add(M(cil(14, 19), matAcero, 0, 37.5, 0));
  gStepper.add(M(box(35, 1, 7), matAcero, 0, 47.5, 0));
  gStepper.add(M(cil(3.5, 1, 18), matAcero, 17.5, 47.5, 0));
  gStepper.add(M(cil(3.5, 1, 18), matAcero, -17.5, 47.5, 0));
  gStepper.add(M(cil(4.5, 2), matAcero, 0, 49, 0));
  gStepper.add(M(cil(2.5, 9), matAlu, 0, 52.5, 0));
  gStepper.add(M(box(14.6, 16.5, 6), matServo, 0, 38, 15.5));
  gStepper.add(M(box(11, 6, 3), matBlanco, 0, 38, 19.5));

  const gEsp = grupo('ESP32 DevKit', 'Controlador en tiempo real (PCB 54.4×27.9 mm, módulo WROOM-32 18×25.5). Ejecuta la FSM, la ISR del pulsador y habla con la PC por USB-serie.', torreta);
  gEsp.position.set(-14, 0, -22); gEsp.rotation.y = 0.14;
  gEsp.add(M(box(27.9, 1.6, 54.4), matPcbEsp, 0, 7, 0));
  gEsp.add(M(box(18, 3.1, 25.5), matAcero, 0, 9.3, -12));
  gEsp.add(M(box(8, 3, 6), matAcero, 0, 8.7, 24.5));
  gEsp.add(M(box(2.5, 8.5, 48), matChip, 12.7, 4, 0));
  gEsp.add(M(box(2.5, 8.5, 48), matChip, -12.7, 4, 0));

  const gUln = grupo('Driver ULN2003', 'Etapa de potencia del stepper (arreglo Darlington). Recibe IN1–IN4 del ESP32 y energiza las bobinas; sus LEDs muestran la secuencia.', torreta);
  gUln.position.set(26, 0, -14); gUln.rotation.y = -0.24;
  gUln.add(M(box(32, 1.6, 35), matPcbVerde, 0, 7, 0));
  gUln.add(M(box(7, 5, 19), matChip, -6, 10, 0));
  gUln.add(M(box(6, 7, 14), matBlanco, 8, 11, 6));
  for (let i = 0; i < 4; i++) gUln.add(M(box(2, .8, 1.2), matLed, 8, 8, -12 + i * 4));

  const gConsola = grupo('Consola LCD 1602', 'Pantalla de estado real de 80×36 mm (área visible 71×26) integrada al chasis, inclinada 35° hacia el operador. Muestra modo, distancia y temperatura.', torreta);
  gConsola.position.set(0, 0, 48);
  const cuna = new THREE.Mesh(wedgeGeometry(88, 28, 32, 35), matGrafito);
  cuna.castShadow = cuna.receiveShadow = true;
  gConsola.add(cuna);
  const lcd = new THREE.Group();
  lcd.position.set(0, 19, 1.5); lcd.rotation.x = THREE.MathUtils.degToRad(-35);
  lcd.add(M(box(80, 36, 1.6), matPcbVerde));
  lcd.add(M(box(75, 30.5, 7), matChip, 0, 0, 4.3));
  lcd.add(M(box(66, 18, 1.4), matLcd, 0, 0, 8));
  gConsola.add(lcd);

  // ---------------- grupoPan ----------------
  torreta.add(grupoPan);

  const gPlat = grupo('Plataforma de azimut', 'Disco Ø96 solidario al eje del stepper. El anillo ámbar y los índices marcan el sector de giro de ±180°.', grupoPan);
  gPlat.add(M(cil(9, 4, 32), matGrafito, 0, 57, 0));
  gPlat.add(M(cil(48, 8, 72), matGrafito, 0, 60, 0));
  gPlat.add(M(tubo(48.4, 2.6, 72), matAmbar, 0, 60.6, 0));
  for (let a = -150; a <= 150; a += 60) {
    const r = THREE.MathUtils.degToRad(a);
    gPlat.add(M(box(2.2, .6, 6), matAmbar, 42 * Math.sin(r), 64.2, 42 * Math.cos(r), 0, r));
  }

  const armDesc = 'Brazo de la horquilla: estructura impresa que sostiene el pod en el eje de elevación, con franja de identificación.';
  for (const sx of [-1, 1]) {
    const gArm = grupo(sx > 0 ? 'Brazo derecho' : 'Brazo izquierdo', armDesc, grupoPan);
    gArm.add(M(box(16, 70, 30, 5), matGrafito, 34 * sx, 99, 0));
    gArm.add(M(box(1.4, 52, 16), matAmbar, 42.4 * sx, 99, 0));
  }
  const gPuente = grupo('Puente trasero', 'Riostra que rigidiza los dos brazos de la horquilla.', grupoPan);
  gPuente.add(M(box(52, 16, 12, 3), matGrafito, 0, 78, -16));

  const gServo = grupo('Servo SG90', 'Micro-servo de elevación a medidas de datasheet: cuerpo 22.5×11.8×22.7 mm, aletas a 32.2 mm apoyadas en la cara del brazo. Su horn engrana el muñón del pod.', grupoPan);
  // construido con el eje del horn sobre el eje de tilt (y=118), cuerpo hacia afuera
  // marco local del servo: -Y = hacia el horn; el grupo se rota para que el
  // eje del horn quede sobre el eje de tilt apuntando al pod (-X mundo)
  gServo.rotation.z = -Math.PI / 2;
  gServo.position.set(58.4, 118, 0);
  gServo.add(M(box(22.5, 22.7, 11.8), matServo, .55, -11.35, 0));
  gServo.add(M(box(32.2, 2.5, 11.8), matServo, .55, -17.05, 0));
  gServo.add(M(cil(5.9, 4), matServo, 0, -26.05, 0));
  gServo.add(M(cil(2.8, 3), matServo, -7, -25.6, 0));
  gServo.add(M(cil(2.3, 3.2), matCrema, 0, -29.95, 0));
  gServo.add(M(cil(3.5, 1.6), matCrema, 0, -32.2, 0));
  gServo.add(M(box(4.5, 1.6, 17), matCrema, 0, -32.2, -8));

  const gPivote = grupo('Pivote izquierdo', 'Eje pasivo del lado opuesto al servo: cierra el eje de elevación.', grupoPan);
  gPivote.add(M(cil(8, 6, 32), matAlu, -27, 118, 0, 0, 0, Math.PI / 2));
  gPivote.add(M(cil(3.5, 4, 24), matAlu, -23.5, 118, 0, 0, 0, Math.PI / 2));

  // ---------------- grupoTilt ----------------
  grupoPan.add(grupoTilt);

  const gPod = grupo('Pod de sensores', 'Carcasa basculante que integra cámara, láser y ultrasonido apuntando a lo mismo: la fusión de sensores del proyecto, en hardware.', grupoTilt);
  gPod.add(M(box(52, 32, 60, 6), matGrafito, 0, 0, 4));
  gPod.add(M(cil(11, 5, 48), matPanel, 27.5, 0, 0, 0, 0, Math.PI / 2));
  gPod.add(M(cil(11, 5, 48), matPanel, -27.5, 0, 0, 0, 0, Math.PI / 2));
  gPod.add(M(box(1.2, 18, 34), matPanel, 26.6, 0, 6));
  gPod.add(M(box(1.2, 18, 34), matPanel, -26.6, 0, 6));

  const gCanon = grupo('Cañón porta-láser', 'Tubo óptico Ø16: aloja el haz del KY-008. El freno de boca ámbar remata la salida de latón del emisor.', grupoTilt);
  gCanon.add(M(cil(8, 56), matPanel, 0, 0, 62, Math.PI / 2));
  gCanon.add(M(cil(10, 10), matGrafito, 0, 0, 38, Math.PI / 2));
  gCanon.add(M(tubo(9.5, 7), matAmbar, 0, 0, 88, Math.PI / 2));
  gCanon.add(M(cil(4, 7), matLaton, 0, 0, 91, Math.PI / 2));
  gCanon.add(M(cil(2.4, 1.2), matLente, 0, 0, 94.7, Math.PI / 2));

  const gKy = grupo('Láser KY-008', 'Módulo láser a medidas reales: PCB 18.5×15 mm con tubo de latón Ø6.5×10.5. Es el "disparo" indicador del proyecto (no hay proyectil).', grupoTilt);
  gKy.position.set(0, 17.2, 24);
  gKy.add(M(cil(1.2, 4, 12), matAlu, -6, -2.8, -2));
  gKy.add(M(cil(1.2, 4, 12), matAlu, 6, -2.8, -2));
  gKy.add(M(box(15, 1.6, 18.5), matPcbRojo));
  gKy.add(M(cil(3.25, 10.5), matLaton, 0, 4, 12.5, Math.PI / 2));
  gKy.add(M(cil(1.8, 1), matLente, 0, 4, 18.2, Math.PI / 2));
  gKy.add(M(box(8, 2.5, 2.5), matChip, 0, 2, -8.5));

  const gCam = grupo('Cámara M12', 'Cámara de placa a medidas reales: PCB 32×32 mm, holder 16×16 y lente M12 en barril Ø13×16 con anillo de foco. Coaxial al cañón: centrar el blanco en su imagen es apuntar.', grupoTilt);
  gCam.position.set(0, 35, 12);
  gCam.add(M(box(36, 36, 3), matGrafito, 0, 0, -2.6));
  gCam.add(M(box(6, 14, 3), matGrafito, 0, -17, -3.5));
  gCam.add(M(box(32, 32, 1.6), matPcbVerde));
  for (const px of [-14, 14]) for (const py of [-14, 14])
    gCam.add(M(cil(1.1, 2.4, 12), matAlu, px, py, .5, Math.PI / 2));
  gCam.add(M(box(16, 16, 6), matChip, 0, 0, 3.8));
  gCam.add(M(cil(6.5, 16), matChip, 0, 0, 14.8, Math.PI / 2));
  gCam.add(M(tubo(7.2, 3.2), matPanel, 0, 0, 19.5, Math.PI / 2));
  gCam.add(M(cil(4.6, 1.4), matLente, 0, 0, 22.9, Math.PI / 2));
  gCam.add(M(box(1.8, 1, 1.2), matLed, 12, -14.8, 1.2));

  const gUs = grupo('Ultrasonido HC-SR04', 'Sensor de distancia a medidas reales: PCB 45×20 mm, transductores Ø16×12 con centros a 26 mm. Coaxial al cañón, aporta el rango para decidir el disparo.', grupoTilt);
  gUs.position.set(0, -22, 31);
  gUs.add(M(box(48, 24, 3), matGrafito, 0, 1, -2.4));
  gUs.add(M(box(45, 20, 1.6), matPcbAzul));
  for (const px of [-13, 13]) {
    gUs.add(M(cil(8, 12, 40), matAcero, px, 0, 6.9, Math.PI / 2));
    gUs.add(M(cil(6.9, .8, 40), matMalla, px, 0, 13.2, Math.PI / 2));
  }
  gUs.add(M(box(10, 4, 3.4), matAcero, 0, -6, 2.5));
  gUs.add(M(box(10, 2.5, 2.5), matChip, 0, -11, -1.8));

  const gImu = grupo('IMU GY-521 (MPU6050)', 'Acelerómetro+giróscopo a medidas reales (PCB 21.2×16.4 mm). Da la referencia absoluta de elevación: en el homing lleva el cañón a pitch = 0°.', grupoTilt);
  gImu.position.set(0, 16.8, -16);
  gImu.add(M(box(16.4, 1.6, 21.2), matPcbViol));
  gImu.add(M(box(4, .9, 4), matChip, 0, 1.2, 2));
  gImu.add(M(box(2.5, 2.5, 20.3), matChip, -6, -2, 0));

  const gDisip = grupo('Disipador trasero', 'Aletas de ventilación del pod; también funcionan como contrapeso del cañón.', grupoTilt);
  for (let i = 0; i < 5; i++) gDisip.add(M(box(2.4, 22, 9), matPanel, -16 + i * 8, 0, -30));
  const gGland = grupo('Prensaestopas', 'Salida ordenada del mazo de cables del pod hacia la base, con anillo de identificación.', grupoTilt);
  gGland.add(M(cil(4, 7), matPanel, 0, -6, -36, Math.PI / 2));
  gGland.add(M(tubo(4.6, 1.6), matAmbar, 0, -6, -39.2, Math.PI / 2));
}

// Cuña de la consola (perfil trapecio extruido)
function wedgeGeometry(w, d, h, angDeg) {
  const recorte = h - Math.tan(THREE.MathUtils.degToRad(angDeg)) * d;
  const s = new THREE.Shape();
  s.moveTo(-d / 2, 0); s.lineTo(d / 2, 0); s.lineTo(d / 2, Math.max(recorte * .3, 4));
  s.lineTo(-d / 2, h); s.closePath();
  const g = new THREE.ExtrudeGeometry(s, { depth: w, bevelEnabled: false });
  g.rotateY(-Math.PI / 2); g.translate(w / 2 - w, 0, 0);
  // ExtrudeGeometry extruye en +Z: tras rotar, centrar en X
  g.computeBoundingBox();
  const c = new THREE.Vector3(); g.boundingBox.getCenter(c);
  g.translate(-c.x, 0, 0);
  return g;
}

// ============================== setupLights =================================
function setupLights() {
  escena.add(new THREE.HemisphereLight(0xbfd0e0, 0x14161a, 0.35));
  const key = new THREE.DirectionalLight(0xfff2e0, 2.6);
  key.position.set(260, 360, 200);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.left = key.shadow.camera.bottom = -260;
  key.shadow.camera.right = key.shadow.camera.top = 260;
  key.shadow.bias = -0.0004;
  escena.add(key);
  const fill = new THREE.DirectionalLight(0xcfe0ff, 0.55);
  fill.position.set(-320, 140, 140);
  escena.add(fill);
  const rim = new THREE.SpotLight(0xffffff, 4200, 0, Math.PI / 5, 0.4);
  rim.position.set(-60, 320, -380);
  escena.add(rim);

  // piso reflectante oscuro
  const piso = new THREE.Mesh(new THREE.CircleGeometry(900, 80),
    new THREE.MeshStandardMaterial({ color: 0x111317, roughness: .28, metalness: .75 }));
  piso.rotation.x = -Math.PI / 2;
  piso.receiveShadow = true;
  escena.add(piso);
}

// ====================== EXPLOTADO / SELECCIÓN / DEMO ========================
const explotables = [];
function prepararExplotado() {
  const centro = new THREE.Vector3(0, 85, 0);
  torreta.updateWorldMatrix(true, true);
  torreta.traverse(o => {
    if (!o.userData?.explotable) return;
    const bb = new THREE.Box3().setFromObject(o);
    if (bb.isEmpty()) return;
    const c = bb.getCenter(new THREE.Vector3());
    const dir = c.clone().sub(centro);
    if (dir.length() < 1) dir.set(0, 1, 0);
    dir.normalize();
    // dirección en el espacio del padre (pose neutra al inicio)
    const q = o.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
    explotables.push({ g: o, orig: o.position.clone(),
                       dir: dir.applyQuaternion(q),
                       dist: 26 + c.distanceTo(centro) * 0.55 });
  });
}
let tExp = 0, tExpDestino = 0;
function explodeView(t) {
  for (const e of explotables)
    e.g.position.copy(e.orig).addScaledVector(e.dir, e.dist * t);
}

// --- selección por raycasting ---
const ray = new THREE.Raycaster(), puntero = new THREE.Vector2();
let seleccion = null, stash = [];
function deseleccionar() {
  for (const { mesh, mat } of stash) mesh.material = mat;
  stash = []; seleccion = null;
  document.getElementById('info').style.display = 'none';
}
function seleccionar(g) {
  deseleccionar();
  seleccion = g;
  g.traverse(m => {
    if (!m.isMesh) return;
    stash.push({ mesh: m, mat: m.material });
    const hl = m.material.clone();
    hl.emissive = new THREE.Color(0xffb547);
    hl.emissiveIntensity = Math.max(hl.emissiveIntensity ?? 0, .45);
    m.material = hl;
  });
  document.getElementById('infoNombre').textContent = g.userData.nombre;
  document.getElementById('infoDesc').textContent = g.userData.desc;
  document.getElementById('info').style.display = 'block';
}
let downXY = null;
renderer.domElement.addEventListener('pointerdown', e => downXY = [e.clientX, e.clientY]);
renderer.domElement.addEventListener('pointerup', e => {
  if (!downXY || Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]) > 5) return;
  puntero.set(e.clientX / innerWidth * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(puntero, camara);
  const hit = ray.intersectObject(torreta, true)[0];
  if (!hit) return deseleccionar();
  let o = hit.object;
  while (o && !o.userData?.nombre) o = o.parent;
  if (o) seleccionar(o); else deseleccionar();
});
addEventListener('keydown', e => {
  if (e.key === 'Escape') deseleccionar();
  if (e.key.toLowerCase() === 'm') toggleDemo();
});

// --- modo demo: seguimiento de un objetivo + disparo láser ---
let demo = false, panAct = 0, tiltAct = 0, fuegoHasta = 0, enfriado = 0;
const objetivo = new THREE.Group();
const orbe = M(new THREE.SphereGeometry(7, 28, 20),
  new THREE.MeshPhysicalMaterial({ color: 0xff7043, roughness: .3, clearcoat: .8,
    emissive: 0xff7043, emissiveIntensity: .25 }));
objetivo.add(orbe);
objetivo.add(M(new THREE.SphereGeometry(8.6, 20, 14),
  new THREE.MeshBasicMaterial({ color: 0xff7043, wireframe: true, transparent: true,
    opacity: .22, toneMapped: false })));
objetivo.visible = false;
escena.add(objetivo);
const haz = new THREE.Mesh(cil(0.7, 1, 10), matHaz);
haz.visible = false;
escena.add(haz);

function toggleDemo(force) {
  demo = force ?? !demo;
  objetivo.visible = demo;
  if (!demo) haz.visible = false;
  document.getElementById('bDemo').classList.toggle('on', demo);
  document.getElementById('bDemo').textContent = demo ? '■ Detener demo (M)' : '▶ Modo demo (M)';
  if (demo) { tExpDestino = 0; document.getElementById('sExplotar').value = 0; }
}

function updateDemo(dt, t) {
  if (!demo) {
    panAct += (0 - panAct) * Math.min(1, dt * 2);
    tiltAct += (0 - tiltAct) * Math.min(1, dt * 2);
  } else {
    const ang = THREE.MathUtils.degToRad(55 * Math.sin(t * .42));
    const radio = 250 + 70 * Math.sin(t * .23 + 1);
    const alt = 150 + 70 * Math.sin(t * .31);
    objetivo.position.set(radio * Math.sin(ang), alt, radio * Math.cos(ang));
    const panDes = Math.atan2(objetivo.position.x, objetivo.position.z);
    const dH = Math.hypot(objetivo.position.x, objetivo.position.z);
    const tiltDes = Math.atan2(objetivo.position.y - 118, dH);
    panAct += (panDes - panAct) * Math.min(1, dt * 3.2);
    tiltAct += (tiltDes - tiltAct) * Math.min(1, dt * 3.2);
    const alineado = Math.abs(panDes - panAct) < .03 && Math.abs(tiltDes - tiltAct) < .03;
    if (alineado && t > enfriado) { fuegoHasta = t + .45; enfriado = t + 1.9; }
    const disparando = t < fuegoHasta;
    haz.visible = disparando;
    orbe.material.emissiveIntensity = disparando ? 2.2 : .25;
    if (disparando) {
      const boca = new THREE.Vector3(0, 0, 94).applyMatrix4(grupoTilt.matrixWorld);
      const fin = objetivo.position;
      const dirH = fin.clone().sub(boca);
      haz.position.copy(boca).addScaledVector(dirH, .5);
      haz.scale.set(1, dirH.length(), 1);
      haz.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirH.normalize());
    }
  }
  grupoPan.rotation.y = THREE.MathUtils.clamp(panAct, -Math.PI, Math.PI);
  grupoTilt.rotation.x = -THREE.MathUtils.clamp(tiltAct, -.15, 1.0);
}

// ================================== UI ======================================
document.getElementById('sExplotar').addEventListener('input', e => {
  tExpDestino = +e.target.value / 100;
  if (tExpDestino > 0.01 && demo) toggleDemo(false);
});
document.getElementById('bDemo').addEventListener('click', () => toggleDemo());
const bRotar = document.getElementById('bRotar');
bRotar.addEventListener('click', () => {
  controles.autoRotate = !controles.autoRotate;
  bRotar.classList.toggle('on', controles.autoRotate);
});
document.getElementById('bReset').addEventListener('click', () => {
  camara.position.copy(CAM0.pos);
  controles.target.copy(CAM0.tgt);
});
document.querySelectorAll('#variantes div').forEach(d =>
  d.addEventListener('click', () => {
    document.querySelectorAll('#variantes div').forEach(x => x.classList.remove('on'));
    d.classList.add('on');
    matGrafito.color.set(d.dataset.c);
  }));

// ================================ LOOP ======================================
buildProduct();
setupLights();
prepararExplotado();

const reloj = new THREE.Clock();
let tPrev = 0;
function animar() {
  requestAnimationFrame(animar);
  const t = reloj.getElapsedTime();
  const dt = Math.min(t - tPrev, .05);
  tPrev = t;

  tExp += (tExpDestino - tExp) * Math.min(1, dt * 4);
  if (Math.abs(tExp - tExpDestino) > 1e-4) explodeView(tExp);
  updateDemo(dt, t);

  controles.update();
  renderer.render(escena, camara);
}
addEventListener('resize', () => {
  camara.aspect = innerWidth / innerHeight;
  camara.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
animar();
</script>
