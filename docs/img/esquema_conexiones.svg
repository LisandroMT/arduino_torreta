<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="1080" viewBox="0 0 1460 1080" font-family="Helvetica, Arial, sans-serif">
  <rect width="1460" height="1080" fill="#ffffff"/>
  <text x="735" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Torreta ESP32 — Esquema de conexión</text>

  <!-- ================= RIELES ================= -->
  <!-- Fuente externa -->
  <rect x="30" y="42" width="95" height="56" rx="6" fill="#ffe5e5" stroke="#a33" stroke-width="1.5"/>
  <text x="77" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#a33">FUENTE</text>
  <text x="77" y="82" text-anchor="middle" font-size="12" fill="#a33">5 V ext.</text>
  <!-- riel 5V -->
  <line x1="125" y1="70" x2="1430" y2="70" stroke="#d62728" stroke-width="4"/>
  <text x="560" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#d62728">RIEL 5 V (fuente externa)</text>
  <!-- riel 3.3V -->
  <line x1="100" y1="110" x2="1430" y2="110" stroke="#ff8c00" stroke-width="4"/>
  <text x="560" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff8c00">RIEL 3.3 V (del pin 3V3 del ESP32)</text>
  <!-- riel GND -->
  <line x1="45" y1="1000" x2="1430" y2="1000" stroke="#222" stroke-width="4"/>
  <text x="400" y="990" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">GND COMÚN (rieles azules puenteados: fuente + ESP32 + módulos)</text>
  <!-- GND de la fuente -->
  <line x1="45" y1="98" x2="45" y2="1000" stroke="#222" stroke-width="2.5"/>

  <!-- ============ CARRILES IZQUIERDOS ============ -->
  <line x1="60" y1="290" x2="60" y2="1000" stroke="#222" stroke-width="2.5"/>
  <line x1="82" y1="70" x2="82" y2="645" stroke="#d62728" stroke-width="2.5"/>
  <circle cx="82" cy="70" r="4" fill="#d62728"/>
  <line x1="104" y1="110" x2="104" y2="210" stroke="#ff8c00" stroke-width="2.5"/>
  <circle cx="104" cy="110" r="4" fill="#ff8c00"/>
  <circle cx="60" cy="1000" r="4" fill="#222"/>

  <!-- ============ CARRILES DERECHOS ============ -->
  <line x1="1155" y1="185" x2="1155" y2="1000" stroke="#222" stroke-width="2.5"/>
  <circle cx="1155" cy="1000" r="4" fill="#222"/>
  <line x1="1135" y1="70" x2="1135" y2="625" stroke="#d62728" stroke-width="2.5"/>
  <circle cx="1135" cy="70" r="4" fill="#d62728"/>
  <line x1="1115" y1="110" x2="1115" y2="785" stroke="#ff8c00" stroke-width="2.5"/>
  <circle cx="1115" cy="110" r="4" fill="#ff8c00"/>

  <!-- ============ BORDE DE PROTOBOARD (pasa por debajo del ESP32) ============ -->
  <line x1="770" y1="210" x2="770" y2="950" stroke="#8d6e63" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="770" y="968" text-anchor="middle" font-size="12" font-style="italic" fill="#8d6e63">borde de la protoboard</text>

  <!-- ============ CABLES LADO IZQUIERDO ============ -->
  <!-- Joystick VRx -> GPIO34 -->
  <polyline points="340,200 480,200 480,300 640,300" fill="none" stroke="#6a5acd" stroke-width="2.5"/>
  <!-- Joystick VRy -> GPIO35 -->
  <polyline points="340,240 460,240 460,350 640,350" fill="none" stroke="#6a5acd" stroke-width="2.5"/>
  <!-- Joystick SW -> GPIO23 (rodea la placa por arriba) -->
  <polyline points="340,280 380,280 380,150 990,150 990,400 900,400" fill="none" stroke="#e377c2" stroke-width="2.5"/>
  <text x="685" y="142" text-anchor="middle" font-size="11" fill="#e377c2" font-weight="bold">SW (pulsador → ISR)</text>
  <!-- Joystick VCC -> riel 3.3 / GND -> carril -->
  <polyline points="120,210 104,210" fill="none" stroke="#ff8c00" stroke-width="2.5"/>
  <circle cx="104" cy="210" r="4" fill="#ff8c00"/>
  <polyline points="120,290 60,290" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="60" cy="290" r="4" fill="#222"/>

  <!-- ULN2003 IN1..IN4 -->
  <polyline points="340,390 500,390 500,550 640,550" fill="none" stroke="#607d8b" stroke-width="2.5"/>
  <polyline points="340,420 480,420 480,500 640,500" fill="none" stroke="#607d8b" stroke-width="2.5"/>
  <polyline points="340,450 640,450" fill="none" stroke="#607d8b" stroke-width="2.5"/>
  <polyline points="340,480 440,480 440,400 640,400" fill="none" stroke="#607d8b" stroke-width="2.5"/>
  <!-- ULN2003 + / - -->
  <polyline points="120,510 82,510" fill="none" stroke="#d62728" stroke-width="2.5"/>
  <circle cx="82" cy="510" r="4" fill="#d62728"/>
  <polyline points="120,540 60,540" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="60" cy="540" r="4" fill="#222"/>

  <!-- Servo señal -> GPIO13 -->
  <polyline points="340,615 520,615 520,650 640,650" fill="none" stroke="#a0522d" stroke-width="2.5"/>
  <!-- Servo 5V / GND -->
  <polyline points="120,645 82,645" fill="none" stroke="#d62728" stroke-width="2.5"/>
  <circle cx="82" cy="645" r="4" fill="#d62728"/>
  <polyline points="120,675 60,675" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="60" cy="675" r="4" fill="#222"/>
  <text x="230" y="712" text-anchor="middle" font-size="11" fill="#a33">⚠ capacitor 220–470 µF entre 5 V y GND, cerca del servo</text>

  <!-- Buzzer + -> GPIO27 -->
  <polyline points="340,760 540,760 540,600 640,600" fill="none" stroke="#444" stroke-width="2.5"/>
  <polyline points="120,790 60,790" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="60" cy="790" r="4" fill="#222"/>

  <!-- ESP32 GND (hilera aire) -> riel GND -->
  <polyline points="640,700 610,700 610,1000" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="610" cy="1000" r="4" fill="#222"/>

  <!-- ============ CABLES LADO DERECHO ============ -->
  <!-- 3V3 -> riel 3.3 -->
  <polyline points="900,300 930,300 930,110" fill="none" stroke="#ff8c00" stroke-width="2.5"/>
  <circle cx="930" cy="110" r="4" fill="#ff8c00"/>
  <!-- SCL GPIO22 -> LCD + MPU -->
  <polyline points="900,450 1010,450 1010,275 1180,275" fill="none" stroke="#2ca02c" stroke-width="2.5"/>
  <polyline points="1010,405 1180,405" fill="none" stroke="#2ca02c" stroke-width="2.5"/>
  <circle cx="1010" cy="405" r="4" fill="#2ca02c"/>
  <!-- SDA GPIO21 -> LCD + MPU -->
  <polyline points="900,500 1040,500 1040,245 1180,245" fill="none" stroke="#1f77b4" stroke-width="2.5"/>
  <polyline points="1040,435 1180,435" fill="none" stroke="#1f77b4" stroke-width="2.5"/>
  <circle cx="1040" cy="435" r="4" fill="#1f77b4"/>
  <!-- Láser GPIO19 -> S -->
  <polyline points="900,550 1070,550 1070,505 1180,505" fill="none" stroke="#8b0000" stroke-width="2.5"/>
  <!-- TRIG GPIO5 -> HC-SR04 -->
  <polyline points="900,650 1100,650 1100,655 1180,655" fill="none" stroke="#b8860b" stroke-width="2.5"/>
  <!-- ECHO + divisor -->
  <polyline points="1180,685 1080,685" fill="none" stroke="#8e24aa" stroke-width="2.5"/>
  <rect x="1020" y="677" width="60" height="16" fill="#fff" stroke="#8e24aa" stroke-width="2"/>
  <text x="1050" y="671" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e24aa">1 kΩ</text>
  <polyline points="1020,685 1000,685" fill="none" stroke="#8e24aa" stroke-width="2.5"/>
  <circle cx="1000" cy="685" r="4" fill="#8e24aa"/>
  <polyline points="1000,685 940,685 940,600 900,600" fill="none" stroke="#8e24aa" stroke-width="2.5"/>
  <line x1="1000" y1="685" x2="1000" y2="705" stroke="#8e24aa" stroke-width="2.5"/>
  <rect x="992" y="705" width="16" height="60" fill="#fff" stroke="#8e24aa" stroke-width="2"/>
  <text x="1016" y="740" text-anchor="start" font-size="11" font-weight="bold" fill="#8e24aa">2 kΩ</text>
  <line x1="1000" y1="765" x2="1000" y2="1000" stroke="#222" stroke-width="2.5"/>
  <circle cx="1000" cy="1000" r="4" fill="#222"/>
  <!-- DHT DATA GPIO4 -->
  <polyline points="900,700 960,700 960,815 1180,815" fill="none" stroke="#17becf" stroke-width="2.5"/>

  <!-- Stubs de alimentación módulos derechos -->
  <polyline points="1180,185 1155,185" fill="none" stroke="#222" stroke-width="2.5"/>
  <polyline points="1180,215 1135,215" fill="none" stroke="#d62728" stroke-width="2.5"/>
  <circle cx="1135" cy="215" r="4" fill="#d62728"/>
  <polyline points="1180,345 1115,345" fill="none" stroke="#ff8c00" stroke-width="2.5"/>
  <circle cx="1115" cy="345" r="4" fill="#ff8c00"/>
  <polyline points="1180,375 1155,375" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="1155" cy="375" r="4" fill="#222"/>
  <polyline points="1180,535 1155,535" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="1155" cy="535" r="4" fill="#222"/>
  <polyline points="1180,625 1135,625" fill="none" stroke="#d62728" stroke-width="2.5"/>
  <polyline points="1180,715 1155,715" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="1155" cy="715" r="4" fill="#222"/>
  <polyline points="1180,785 1115,785" fill="none" stroke="#ff8c00" stroke-width="2.5"/>
  <polyline points="1180,845 1155,845" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="1155" cy="845" r="4" fill="#222"/>

  <!-- ================= ESP32 ================= -->
  <rect x="640" y="240" width="260" height="520" rx="10" fill="#37474f" stroke="#222" stroke-width="2"/>
  <text x="770" y="278" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">ESP32</text>
  <rect x="700" y="380" width="140" height="140" rx="4" fill="#263238" stroke="#111"/>
  <text x="770" y="455" text-anchor="middle" font-size="11" fill="#90a4ae">ESP-WROOM-32</text>
  <!-- USB -->
  <rect x="810" y="760" width="70" height="24" rx="3" fill="#9e9e9e" stroke="#555"/>
  <text x="845" y="777" text-anchor="middle" font-size="11" fill="#222">USB</text>
  <text x="845" y="805" text-anchor="middle" font-size="11" fill="#555">a la PC (alimenta el ESP32)</text>

  <!-- anotaciones de hileras -->
  <text x="620" y="228" text-anchor="end" font-size="13" font-style="italic" fill="#8d6e63">hilera EN EL AIRE (dupont hembra)</text>
  <text x="950" y="228" text-anchor="start" font-size="13" font-style="italic" fill="#8d6e63">hilera EN PROTOBOARD</text>

  <!-- pines izquierdos -->
  <g fill="#fff" font-size="12">
    <text x="652" y="304">GPIO34</text><text x="652" y="354">GPIO35</text>
    <text x="652" y="404">GPIO32</text><text x="652" y="454">GPIO33</text>
    <text x="652" y="504">GPIO25</text><text x="652" y="554">GPIO26</text>
    <text x="652" y="604">GPIO27</text><text x="652" y="654">GPIO13</text>
    <text x="652" y="704">GND</text>
  </g>
  <g fill="#ffd54f" stroke="#555">
    <circle cx="640" cy="300" r="4"/><circle cx="640" cy="350" r="4"/>
    <circle cx="640" cy="400" r="4"/><circle cx="640" cy="450" r="4"/>
    <circle cx="640" cy="500" r="4"/><circle cx="640" cy="550" r="4"/>
    <circle cx="640" cy="600" r="4"/><circle cx="640" cy="650" r="4"/>
    <circle cx="640" cy="700" r="4"/>
  </g>
  <!-- pines derechos -->
  <g fill="#fff" font-size="12" text-anchor="end">
    <text x="888" y="304">3V3</text><text x="888" y="354">GND</text>
    <text x="888" y="404">GPIO23</text><text x="888" y="454">GPIO22</text>
    <text x="888" y="504">GPIO21</text><text x="888" y="554">GPIO19</text>
    <text x="888" y="604">GPIO18</text><text x="888" y="654">GPIO5</text>
    <text x="888" y="704">GPIO4</text>
  </g>
  <g fill="#ffd54f" stroke="#555">
    <circle cx="900" cy="300" r="4"/><circle cx="900" cy="350" r="4"/>
    <circle cx="900" cy="400" r="4"/><circle cx="900" cy="450" r="4"/>
    <circle cx="900" cy="500" r="4"/><circle cx="900" cy="550" r="4"/>
    <circle cx="900" cy="600" r="4"/><circle cx="900" cy="650" r="4"/>
    <circle cx="900" cy="700" r="4"/>
  </g>
  <!-- símbolo de tierra en el GND derecho -->
  <line x1="900" y1="350" x2="925" y2="350" stroke="#222" stroke-width="2.5"/>
  <line x1="925" y1="350" x2="925" y2="360" stroke="#222" stroke-width="2.5"/>
  <line x1="916" y1="360" x2="934" y2="360" stroke="#222" stroke-width="2.5"/>
  <line x1="920" y1="365" x2="930" y2="365" stroke="#222" stroke-width="2"/>
  <line x1="923" y1="370" x2="927" y2="370" stroke="#222" stroke-width="1.5"/>

  <!-- ================= MÓDULOS IZQUIERDA ================= -->
  <!-- Joystick -->
  <rect x="120" y="170" width="220" height="160" rx="8" fill="#dce6f5" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="193" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">Joystick analógico</text>
  <g font-size="12" fill="#223">
    <text x="130" y="214">VCC (3.3 V)</text>
    <text x="130" y="294">GND</text>
    <text x="330" y="204" text-anchor="end">VRx</text>
    <text x="330" y="244" text-anchor="end">VRy</text>
    <text x="330" y="284" text-anchor="end">SW</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="120" cy="210" r="3.5"/><circle cx="120" cy="290" r="3.5"/>
    <circle cx="340" cy="200" r="3.5"/><circle cx="340" cy="240" r="3.5"/><circle cx="340" cy="280" r="3.5"/>
  </g>

  <!-- ULN2003 + stepper -->
  <rect x="120" y="370" width="220" height="190" rx="8" fill="#e8f5dc" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="392" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">ULN2003</text>
  <text x="230" y="555" text-anchor="middle" font-size="12" fill="#445">+ motor 28BYJ-48 (azimut)</text>
  <g font-size="12" fill="#223">
    <text x="330" y="394" text-anchor="end">IN1</text>
    <text x="330" y="424" text-anchor="end">IN2</text>
    <text x="330" y="454" text-anchor="end">IN3</text>
    <text x="330" y="484" text-anchor="end">IN4</text>
    <text x="130" y="514">+ (5 V ext.)</text>
    <text x="130" y="544">−</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="340" cy="390" r="3.5"/><circle cx="340" cy="420" r="3.5"/>
    <circle cx="340" cy="450" r="3.5"/><circle cx="340" cy="480" r="3.5"/>
    <circle cx="120" cy="510" r="3.5"/><circle cx="120" cy="540" r="3.5"/>
  </g>

  <!-- Servo -->
  <rect x="120" y="590" width="220" height="100" rx="8" fill="#f5e6dc" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="610" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">Servo SG90 (tilt)</text>
  <g font-size="12" fill="#223">
    <text x="330" y="619" text-anchor="end">señal (naranja)</text>
    <text x="130" y="649">rojo (5 V ext.)</text>
    <text x="130" y="679">marrón (GND)</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="340" cy="615" r="3.5"/><circle cx="120" cy="645" r="3.5"/><circle cx="120" cy="675" r="3.5"/>
  </g>

  <!-- Buzzer -->
  <rect x="120" y="730" width="220" height="80" rx="8" fill="#f0dcf5" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="752" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">Buzzer activo</text>
  <g font-size="12" fill="#223">
    <text x="330" y="764" text-anchor="end">+</text>
    <text x="130" y="794">−</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="340" cy="760" r="3.5"/><circle cx="120" cy="790" r="3.5"/>
  </g>

  <!-- ================= MÓDULOS DERECHA ================= -->
  <!-- LCD -->
  <rect x="1180" y="160" width="240" height="120" rx="8" fill="#dcf0f5" stroke="#555" stroke-width="1.5"/>
  <text x="1300" y="180" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">LCD 1602 (I2C 0x27)</text>
  <g font-size="12" fill="#223">
    <text x="1190" y="189">GND</text>
    <text x="1190" y="219">VCC (5 V)</text>
    <text x="1190" y="249">SDA</text>
    <text x="1190" y="279">SCL</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="1180" cy="185" r="3.5"/><circle cx="1180" cy="215" r="3.5"/>
    <circle cx="1180" cy="245" r="3.5"/><circle cx="1180" cy="275" r="3.5"/>
  </g>

  <!-- MPU6050 -->
  <rect x="1180" y="320" width="240" height="120" rx="8" fill="#e6dcf5" stroke="#555" stroke-width="1.5"/>
  <text x="1300" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">MPU6050 (I2C 0x68)</text>
  <g font-size="12" fill="#223">
    <text x="1190" y="349">VCC (3.3 V)</text>
    <text x="1190" y="379">GND</text>
    <text x="1190" y="409">SCL</text>
    <text x="1190" y="439">SDA</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="1180" cy="345" r="3.5"/><circle cx="1180" cy="375" r="3.5"/>
    <circle cx="1180" cy="405" r="3.5"/><circle cx="1180" cy="435" r="3.5"/>
  </g>

  <!-- Laser -->
  <rect x="1180" y="480" width="240" height="80" rx="8" fill="#f5dcdc" stroke="#555" stroke-width="1.5"/>
  <text x="1300" y="500" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">Láser KY-008</text>
  <g font-size="12" fill="#223">
    <text x="1190" y="509">S</text>
    <text x="1190" y="539">− (pin del medio: sin usar)</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="1180" cy="505" r="3.5"/><circle cx="1180" cy="535" r="3.5"/>
  </g>

  <!-- HC-SR04 -->
  <rect x="1180" y="600" width="240" height="120" rx="8" fill="#dcf5e6" stroke="#555" stroke-width="1.5"/>
  <text x="1300" y="620" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">HC-SR04 (ultrasonido)</text>
  <g font-size="12" fill="#223">
    <text x="1190" y="629">VCC (5 V)</text>
    <text x="1190" y="659">TRIG</text>
    <text x="1190" y="689">ECHO (sale 5 V → divisor)</text>
    <text x="1190" y="719">GND</text>
  </g>
  <g fill="#ddd" stroke="#555">
    <circle cx="1180" cy="625" r="3.5"/><circle cx="1180" cy="655" r="3.5"/>
    <circle cx="1180" cy="685" r="3.5"/><circle cx="1180" cy="715" r="3.5"/>
  </g>

  <!-- DHT22 -->
  <rect x="1180" y="760" width="240" height="110" rx="8" fill="#f5f0dc" stroke="#555" stroke-width="1.5"/>
  <text x="1300" y="780" text-anchor="middle" font-size="15" font-weight="bold" fill="#223">DHT22 (temp/hum)</text>
  <g font-size="12" fill="#223">
    <text x="1190" y="789">VCC (3.3 V)</text>
    <text x="1190" y="819">DATA</text>
    <text x="1190" y="849">GND</text>
  </g>
  <text x="1300" y="864" text-anchor="middle" font-size="10" fill="#666">módulo de 3 pines: pull-up incluida</text>
  <g fill="#ddd" stroke="#555">
    <circle cx="1180" cy="785" r="3.5"/><circle cx="1180" cy="815" r="3.5"/><circle cx="1180" cy="845" r="3.5"/>
  </g>

  <!-- ================= LEYENDA ================= -->
  <g font-size="12" fill="#222">
    <line x1="60" y1="1040" x2="100" y2="1040" stroke="#d62728" stroke-width="3"/><text x="106" y="1044">5 V</text>
    <line x1="160" y1="1040" x2="200" y2="1040" stroke="#ff8c00" stroke-width="3"/><text x="206" y="1044">3.3 V</text>
    <line x1="270" y1="1040" x2="310" y2="1040" stroke="#222" stroke-width="3"/><text x="316" y="1044">GND</text>
    <line x1="380" y1="1040" x2="420" y2="1040" stroke="#2ca02c" stroke-width="3"/><text x="426" y="1044">SCL</text>
    <line x1="480" y1="1040" x2="520" y2="1040" stroke="#1f77b4" stroke-width="3"/><text x="526" y="1044">SDA</text>
    <line x1="580" y1="1040" x2="620" y2="1040" stroke="#e377c2" stroke-width="3"/><text x="626" y="1044">SW/ISR</text>
    <line x1="700" y1="1040" x2="740" y2="1040" stroke="#8e24aa" stroke-width="3"/><text x="746" y="1044">ECHO</text>
    <line x1="810" y1="1040" x2="850" y2="1040" stroke="#b8860b" stroke-width="3"/><text x="856" y="1044">TRIG</text>
