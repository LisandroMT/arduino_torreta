<!DOCTYPE html>
<!--
  Torreta Gatling — prototipo 3D interactivo integrado
  UTN FRSR · Electiva Arduino · TFI 2026

  Estética del diseño CAD original (gunmetal + tubos metálicos + acentos
  amarillos) combinada con los componentes reales del proyecto modelados a
  MEDIDAS DE DATASHEET. Articulada (pan / tilt / spin), con vista explotada
  por partes e inspección de cada componente.

  Doble clic para abrir (requiere internet: Three.js desde CDN).
  Controles: arrastrar = orbitar · rueda = zoom · M = demo · click = inspeccionar.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Torreta Gatling — prototipo integrado</title>
<style>
  :root { --acento: #f2c200; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
  body { background: radial-gradient(120% 95% at 50% 12%, #343c46 0%, #15191f 52%, #06080b 100%); }
  canvas { display: block; }
  #titulo {
    position: fixed; top: 16px; left: 22px; z-index: 10; color: #e8eaed;
    pointer-events: none; letter-spacing: 3px;
  }
  #titulo h1 { margin: 0; font-size: 18px; } #titulo h1 b { color: var(--acento); }
  #titulo span { font-size: 11px; color: #9aa0a6; letter-spacing: 1.5px; }
  #panel {
    position: fixed; top: 16px; right: 16px; z-index: 10; width: 224px;
    background: rgba(15,18,23,.84); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
    color: #dfe3e8; font-size: 12.5px; padding: 14px 16px;
  }
  #panel label { display: block; margin: 10px 0 4px; color: #9aa0a6; font-size: 11px;
                 letter-spacing: 1px; text-transform: uppercase; }
  #panel input[type=range] { width: 100%; accent-color: var(--acento); }
  #panel button {
    width: 100%; margin-top: 8px; padding: 7px; border: 1px solid rgba(255,255,255,.16);
    border-radius: 8px; background: rgba(255,255,255,.05); color: #dfe3e8;
    font-size: 12px; cursor: pointer; transition: all .15s;
  }
  #panel button:hover { border-color: var(--acento); color: var(--acento); }
  #panel button.on { background: var(--acento); border-color: var(--acento);
                     color: #14171c; font-weight: 700; }
  #variantes { display: flex; gap: 8px; margin-top: 4px; }
  #variantes div {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid rgba(255,255,255,.25); transition: transform .12s;
  }
  #variantes div:hover { transform: scale(1.15); }
  #variantes div.on { border-color: var(--acento); }
  #info {
    position: fixed; left: 22px; bottom: 54px; z-index: 10; max-width: 330px;
    background: rgba(15,18,23,.88); backdrop-filter: blur(8px);
    border: 1px solid rgba(242,194,0,.4); border-left: 3px solid var(--acento);
    border-radius: 10px; color: #e8eaed; padding: 12px 16px; display: none;
  }
  #info h2 { margin: 0 0 5px; font-size: 14px; color: var(--acento); }
  #info p { margin: 0; font-size: 12.5px; line-height: 1.45; color: #c5cad1; }
  #ayuda {
    position: fixed; bottom: 14px; left: 0; right: 0; z-index: 9; text-align: center;
    color: #7c828a; font-size: 11.5px; letter-spacing: .6px; pointer-events: none;
  }
  #ayuda b { color: #aab0b8; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="titulo">
  <h1>TORRETA <b>GATLING</b> · PROTOTIPO INTEGRADO</h1>
  <span>DISEÑO ORIGINAL + COMPONENTES A MEDIDAS REALES · TFI ARDUINO UTN FRSR 2026</span>
</div>

<div id="panel">
  <label>Vista explotada</label>
  <input id="sExplotar" type="range" min="0" max="100" value="0">
  <label>Acabado del blindaje</label>
  <div id="variantes">
    <div data-c="#23262b" style="background:#23262b" class="on"></div>
    <div data-c="#8a7a5c" style="background:#8a7a5c"></div>
    <div data-c="#c9ced3" style="background:#c9ced3"></div>
    <div data-c="#4a5440" style="background:#4a5440"></div>
  </div>
  <button id="bDemo">▶ Modo demo (M)</button>
  <button id="bRotar" class="on">⟳ Auto-rotación</button>
  <button id="bReset">⌂ Reset de cámara</button>
</div>

<div id="info"><h2 id="infoNombre"></h2><p id="infoDesc"></p></div>
<div id="ayuda"><b>Arrastrar</b> orbitar · <b>Rueda</b> zoom · <b>Click</b> inspeccionar pieza · <b>M</b> demo · <b>Esc</b> deseleccionar</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ============================ RENDERER / ESCENA =============================
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
document.body.appendChild(renderer.domElement);

const escena = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
escena.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camara = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 1, 6000);
const CAM0 = { pos: new THREE.Vector3(270, 195, 340), tgt: new THREE.Vector3(0, 80, 28) };
camara.position.copy(CAM0.pos);

const controles = new OrbitControls(camara, renderer.domElement);
controles.target.copy(CAM0.tgt);
controles.enableDamping = true;
controles.dampingFactor = 0.06;
controles.autoRotate = true;
controles.autoRotateSpeed = 0.9;
controles.maxPolarAngle = Math.PI * 0.495;
controles.minDistance = 100; controles.maxDistance = 1100;

// ============================== MATERIALES PBR ==============================
// Paleta del diseño CAD original: gunmetal / tubos metálicos claros / amarillo
const matCuerpo = new THREE.MeshPhysicalMaterial({ color: 0x23262b, roughness: .45,
  metalness: .55, clearcoat: .3, clearcoatRoughness: .25 });
const matPanel  = new THREE.MeshPhysicalMaterial({ color: 0x191c20, roughness: .5,
  metalness: .4 });
const matTubo   = new THREE.MeshStandardMaterial({ color: 0x9da0a4, roughness: .3,
  metalness: .9 });
const matAcento = new THREE.MeshPhysicalMaterial({ color: 0xf2c200, roughness: .32,
  clearcoat: .6, emissive: 0xf2c200, emissiveIntensity: .15 });
const matLed    = new THREE.MeshStandardMaterial({ color: 0xf2c200, emissive: 0xf2c200,
  emissiveIntensity: 2.4 });
const matAlu    = new THREE.MeshStandardMaterial({ color: 0xd4d9dd, roughness: .3, metalness: 1 });
const matAcero  = new THREE.MeshStandardMaterial({ color: 0xc8cdd2, roughness: .22, metalness: 1 });
const matLaton  = new THREE.MeshStandardMaterial({ color: 0xc9a44a, roughness: .28, metalness: 1 });
const matLcd    = new THREE.MeshStandardMaterial({ color: 0x9ad65a, emissive: 0x9ad65a,
  emissiveIntensity: 1.1 });
const pcb = c => new THREE.MeshPhysicalMaterial({ color: c, roughness: .48,
  clearcoat: .55, clearcoatRoughness: .12 });
const matPcbAzul = pcb(0x1660a8), matPcbVerde = pcb(0x1f6b34), matPcbRojo = pcb(0xa4252b),
      matPcbViol = pcb(0x5435a0), matPcbEsp = pcb(0x15314f);
const matLente  = new THREE.MeshPhysicalMaterial({ color: 0x10151b, roughness: .06,
  metalness: 0, transmission: .85, ior: 1.45, thickness: 2, clearcoat: 1 });
const matServo  = new THREE.MeshPhysicalMaterial({ color: 0x2a6fd6, roughness: .45, clearcoat: .25 });
const matCrema  = new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: .55 });
const matBlanco = new THREE.MeshStandardMaterial({ color: 0xededed, roughness: .5 });
const matChip   = new THREE.MeshPhysicalMaterial({ color: 0x16191d, roughness: .35,
  metalness: .3, clearcoat: .3 });
const matMalla  = new THREE.MeshStandardMaterial({ color: 0x3c4146, roughness: .85 });
const matHaz    = new THREE.MeshBasicMaterial({ color: 0xff2030, transparent: true,
  opacity: .85, toneMapped: false });

// ========================= HELPERS DE CONSTRUCCIÓN ==========================
function M(geo, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  m.castShadow = m.receiveShadow = true;
  return m;
}
const box  = (w, h, d, r = 0) => r > 0 ? new RoundedBoxGeometry(w, h, d, 4, r)
                                       : new THREE.BoxGeometry(w, h, d);
const cil  = (r, h, s = 40) => new THREE.CylinderGeometry(r, r, h, s);
const tubo = (r, h, s = 40) => new THREE.CylinderGeometry(r, r, h, s, 1, true);

function grupo(nombre, desc, padre) {
  const g = new THREE.Group();
  g.name = nombre;
  g.userData = { nombre, desc, explotable: true };
  padre.add(g);
  return g;
}
function wedgeGeometry(w, d, h, angDeg) {
  const recorte = h - Math.tan(THREE.MathUtils.degToRad(angDeg)) * d;
  const s = new THREE.Shape();
  s.moveTo(-d / 2, 0); s.lineTo(d / 2, 0); s.lineTo(d / 2, Math.max(recorte * .3, 4));
  s.lineTo(-d / 2, h); s.closePath();
  const g = new THREE.ExtrudeGeometry(s, { depth: w, bevelEnabled: false });
  g.rotateY(-Math.PI / 2);
  g.computeBoundingBox();
  const c = new THREE.Vector3(); g.boundingBox.getCenter(c);
  g.translate(-c.x, 0, 0);
  return g;
}

// =============================== buildProduct ===============================
// Y arriba, +Z = frente. Unidades: mm. Pivote de tilt en (0, 96, 40).
const torreta = new THREE.Group();
escena.add(torreta);
const grupoPan = new THREE.Group();
const grupoTilt = new THREE.Group();
grupoTilt.position.set(0, 96, 40);
const grupoSpin = new THREE.Group();   // racimo gatling (gira sobre su eje)

function buildProduct() {
  // ------------------------------ BASE (fija) ------------------------------
  const gCollar = grupo('Collar octogonal', 'Base del diseño original: collar octogonal biselado con tira de luz perimetral. Fija al terreno; dentro aloja el motor de azimut.', torreta);
  const octa = M(new THREE.CylinderGeometry(62, 66, 14, 8), matCuerpo, 0, 7, 0, 0, Math.PI / 8);
  gCollar.add(octa);
  for (let i = 0; i < 8; i++) {
    const a = (i + .5) * Math.PI / 4;
    gCollar.add(M(box(46, 2.4, 1.6), matAcento, 64 * Math.sin(a), 7, 64 * Math.cos(a), 0, a));
  }

  const gPatas = grupo('Patas', 'Seis patas planas de apoyo, herencia del trípode del diseño original; los extremos llevan marca amarilla de gálibo.', torreta);
  for (let i = 0; i < 6; i++) {
    const a = THREE.MathUtils.degToRad(30 + i * 60);
    const px = Math.sin(a), pz = Math.cos(a);
    gPatas.add(M(box(20, 5, 34), matCuerpo, 76 * px, 2.5, 76 * pz, 0, a));
    gPatas.add(M(box(20, 1, 4), matAcento, 91 * px, 5.2, 91 * pz, 0, a));
  }

  const gConsola = grupo('Consola LCD 1602', 'Pantalla real de 80×36 mm (visible 71×26) integrada al frente de la base, inclinada 35°. Muestra modo, distancia y temperatura.', torreta);
  gConsola.position.set(0, 0, 74);
  const cuna = new THREE.Mesh(wedgeGeometry(72, 26, 28, 35), matCuerpo);
  cuna.castShadow = cuna.receiveShadow = true;
  gConsola.add(cuna);
  const lcd = new THREE.Group();
  lcd.position.set(0, 16.5, 1.5); lcd.rotation.x = THREE.MathUtils.degToRad(-35);
  lcd.add(M(box(80, 36, 1.6), matPcbVerde));
  lcd.add(M(box(75, 30.5, 7), matChip, 0, 0, 4.3));
  lcd.add(M(box(66, 18, 1.4), matLcd, 0, 0, 8));
  gConsola.add(lcd);

  const gStepper = grupo('Motor 28BYJ-48', 'Paso a paso real (Ø28×19 mm, brida con agujeros a 35 mm) oculto dentro del pedestal: mueve el azimut en ±180° contando pasos. Explotá la vista para encontrarlo.', torreta);
  gStepper.add(M(cil(14, 19), matAcero, 0, 24.5, 0));
  gStepper.add(M(box(35, 1, 7), matAcero, 0, 34, 0));
  gStepper.add(M(cil(3.5, 1, 18), matAcero, 17.5, 34, 0));
  gStepper.add(M(cil(3.5, 1, 18), matAcero, -17.5, 34, 0));
  gStepper.add(M(cil(4.5, 2), matAcero, 0, 35.5, 0));
  gStepper.add(M(cil(2.5, 9), matAlu, 0, 39, 0));
  gStepper.add(M(box(14.6, 16.5, 6), matServo, 0, 25, 15.5));
  gStepper.add(M(box(11, 6, 3), matBlanco, 0, 25, 19.5));

  // ------------------------------ PAN -------------------------------------
  torreta.add(grupoPan);

  const gTambor = grupo('Pedestal giratorio', 'Tambor del diseño original con panel-lines y escotilla de servicio. Gira en azimut solidario al eje del 28BYJ-48.', grupoPan);
  gTambor.add(M(cil(40, 46, 56), matCuerpo, 0, 37, 0));
  gTambor.add(M(tubo(40.3, 1.6, 56), matPanel, 0, 26, 0));
  gTambor.add(M(tubo(40.3, 1.6, 56), matPanel, 0, 48, 0));
  const aEsc = THREE.MathUtils.degToRad(40);
  gTambor.add(M(box(18, 22, 1.5), matPanel, 40.6 * Math.sin(aEsc), 37, 40.6 * Math.cos(aEsc), 0, aEsc));

  const gRack = grupo('Bandeja de electrónica', 'Bandeja trasera del pedestal: lleva el ESP32 y el ULN2003 a la vista, como en el prototipo real. Gira con la torreta (el sector ±180° evita que el mazo se enrede).', grupoPan);
  gRack.add(M(box(58, 3, 24), matCuerpo, 0, 28, -53));
  gRack.add(M(box(3, 10, 24), matCuerpo, -29, 24, -53));
  gRack.add(M(box(3, 10, 24), matCuerpo, 29, 24, -53));

  const gEsp = grupo('ESP32 DevKit', 'Controlador en tiempo real (PCB 54.4×27.9 mm, módulo WROOM-32 18×25.5). FSM, ISR del pulsador y enlace USB-serie con la PC.', grupoPan);
  gEsp.position.set(-13, 30.5, -53); gEsp.rotation.y = Math.PI / 2;
  gEsp.add(M(box(27.9, 1.6, 54.4), matPcbEsp));
  gEsp.add(M(box(18, 3.1, 25.5), matAcero, 0, 2.3, -12));
  gEsp.add(M(box(8, 3, 6), matAcero, 0, 1.7, 24.5));
  gEsp.add(M(box(2.5, 8.5, 48), matChip, 12.7, -3, 0));
  gEsp.add(M(box(2.5, 8.5, 48), matChip, -12.7, -3, 0));

  const gUln = grupo('Driver ULN2003', 'Etapa de potencia del stepper (Darlington). Sus 4 LEDs muestran la secuencia de bobinas en vivo.', grupoPan);
  gUln.position.set(17, 30.5, -53);
  gUln.add(M(box(32, 1.6, 35), matPcbVerde));
  gUln.add(M(box(7, 5, 19), matChip, -6, 3, 0));
  gUln.add(M(box(6, 7, 14), matBlanco, 8, 4, 6));
  for (let i = 0; i < 4; i++) gUln.add(M(box(2, .8, 1.2), matLed, 8, 1, -12 + i * 4));

  const gCuerpo = grupo('Cuerpo blindado', 'Cuña facetada del diseño original: alta atrás, baja al frente, con franjas de identificación. Sostiene los muñones del mantelete.', grupoPan);
  const perfil = new THREE.Shape();
  perfil.moveTo(-46, 0); perfil.lineTo(30, 0); perfil.lineTo(30, 16);
  perfil.lineTo(16, 34); perfil.lineTo(-26, 58); perfil.lineTo(-46, 58); perfil.closePath();
  const cuerpoGeo = new THREE.ExtrudeGeometry(perfil, { depth: 70, bevelEnabled: true,
    bevelThickness: 2, bevelSize: 2, bevelSegments: 1 });
  cuerpoGeo.rotateY(-Math.PI / 2);
  cuerpoGeo.computeBoundingBox();
  const cc = new THREE.Vector3(); cuerpoGeo.boundingBox.getCenter(cc);
  cuerpoGeo.translate(-cc.x, 60, 0);
  const cuerpo = new THREE.Mesh(cuerpoGeo, matCuerpo);
  cuerpo.castShadow = cuerpo.receiveShadow = true;
  gCuerpo.add(cuerpo);
  gCuerpo.add(M(box(6, 14, 1.2), matAcento, -12, 69, 31.4));
  gCuerpo.add(M(box(6, 14, 1.2), matAcento, 12, 69, 31.4));
  gCuerpo.add(M(box(4, 26, 40), matPanel, 37, 84, -14));
  gCuerpo.add(M(box(4, 26, 40), matPanel, -37, 84, -14));

  const gMastil = grupo('Mástil / baliza', 'Mástil del diseño original. En esta versión es una baliza de estado: el enlace con la PC ya no es WiFi sino USB-serie.', grupoPan);
  gMastil.add(M(cil(1.2, 38, 16), matTubo, -24, 137, -36));
  gMastil.add(M(new THREE.SphereGeometry(2.6, 18, 12), matAcento, -24, 157.5, -36));

  const gBuzzer = grupo('Buzzer', 'Aviso sonoro del disparo y los cambios de modo (BOM del proyecto). Montado sobre el blindaje.', grupoPan);
  gBuzzer.add(M(cil(6, 9, 32), matChip, 18, 113, -24));
  gBuzzer.add(M(cil(1.5, 1, 12), matPanel, 18, 118, -24));

  const gMunones = grupo('Brazos de muñón', 'Orejas frontales que sostienen el eje de elevación del mantelete (diseño original) y la corona donde engrana el servo.', grupoPan);
  for (const sx of [-1, 1]) {
    gMunones.add(M(box(6, 20, 24, 2), matCuerpo, 31 * sx, 96, 36));
    gMunones.add(M(cil(9, 4, 36), matPanel, 27.5 * sx, 96, 40, 0, 0, Math.PI / 2));
  }

  const gServo = grupo('Servo SG90', 'Micro-servo real (cuerpo 22.5×11.8×22.7 mm, aletas a 32.2 mm) atornillado al brazo derecho: su horn engrana el muñón y eleva el mantelete.', grupoPan);
  gServo.rotation.z = -Math.PI / 2;
  gServo.position.set(50.4, 96, 40);
  gServo.add(M(box(22.5, 22.7, 11.8), matServo, .55, -11.35, 0));
  gServo.add(M(box(32.2, 2.5, 11.8), matServo, .55, -17.05, 0));
  gServo.add(M(cil(5.9, 4), matServo, 0, -26.05, 0));
  gServo.add(M(cil(2.8, 3), matServo, -7, -25.6, 0));
  gServo.add(M(cil(2.3, 3.2), matCrema, 0, -29.95, 0));
  gServo.add(M(cil(3.5, 1.6), matCrema, 0, -32.2, 0));
  gServo.add(M(box(4.5, 1.6, 17), matCrema, 0, -32.2, -8));

  // ------------------------------ TILT -------------------------------------
  grupoPan.add(grupoTilt);

  const gMant = grupo('Mantelete', 'Bloque basculante del diseño original: es la cuna que une cañón, cámara, láser y ultrasonido, todos apuntando a lo mismo (fusión de sensores).', grupoTilt);
  gMant.add(M(box(52, 34, 26, 4), matCuerpo, 0, 2, 4));
  gMant.add(M(box(1.4, 20, 18), matAcento, 26.4, 2, 4));
  gMant.add(M(box(1.4, 20, 18), matAcento, -26.4, 2, 4));

  const gCarg = grupo('Cargador', 'La cuña amarilla con triángulo de advertencia del diseño original. Acá es puramente estético: el "disparo" es un láser, no hay proyectil.', grupoTilt);
  gCarg.add(M(box(26, 20, 16, 2), matAcento, 0, 27, -6, THREE.MathUtils.degToRad(-12)));
  const tri = new THREE.Mesh(new THREE.CircleGeometry(5, 3), matPanel);
  tri.position.set(0, 29, 2.6); tri.rotation.x = THREE.MathUtils.degToRad(-12);
  gCarg.add(tri);

  const gCam = grupo('Cámara M12', 'Cámara de placa real: PCB 32×32 mm, holder 16×16, lente M12 en barril Ø13×16 con anillo de foco. Coaxial al cañón: centrar el blanco = apuntar.', grupoTilt);
  gCam.position.set(0, 38, 8);
  gCam.add(M(box(34, 30, 3), matCuerpo, 0, -2, -2.6));
  gCam.add(M(box(6, 14, 3), matCuerpo, 0, -16, -3.5));
  gCam.add(M(box(32, 32, 1.6), matPcbVerde));
  for (const px of [-14, 14]) for (const py of [-14, 14])
    gCam.add(M(cil(1.1, 2.4, 12), matAlu, px, py, .5, Math.PI / 2));
  gCam.add(M(box(16, 16, 6), matChip, 0, 0, 3.8));
  gCam.add(M(cil(6.5, 16), matChip, 0, 0, 14.8, Math.PI / 2));
  gCam.add(M(tubo(7.2, 3.2), matPanel, 0, 0, 19.5, Math.PI / 2));
  gCam.add(M(cil(4.6, 1.4), matLente, 0, 0, 22.9, Math.PI / 2));
  gCam.add(M(box(1.8, 1, 1.2), matLed, 12, -14.8, 1.2));

  const gKy = grupo('Láser KY-008', 'Módulo láser real (PCB 18.5×15 mm, tubo de latón Ø6.5×10.5) montado sobre la cuna: su haz sale por el eje central hueco del racimo gatling.', grupoTilt);
  gKy.position.set(0, 22, 6);
  gKy.add(M(cil(1.2, 4, 12), matAlu, -6, -2.8, -2));
  gKy.add(M(cil(1.2, 4, 12), matAlu, 6, -2.8, -2));
  gKy.add(M(box(15, 1.6, 18.5), matPcbRojo));
  gKy.add(M(cil(3.25, 10.5), matLaton, 0, 3.2, 12.5, Math.PI / 2));
  gKy.add(M(cil(1.8, 1), matLente, 0, 3.2, 18.2, Math.PI / 2));
  gKy.add(M(box(8, 2.5, 2.5), matChip, 0, 1.5, -8.5));

  const gImu = grupo('IMU GY-521 (MPU6050)', 'Acelerómetro+giróscopo real (PCB 21.2×16.4 mm) sobre la cuna: su pitch nivela el cañón en el homing (cero absoluto de elevación).', grupoTilt);
  gImu.position.set(-15, 20.3, -4);
  gImu.add(M(box(16.4, 1.6, 21.2), matPcbViol));
  gImu.add(M(box(4, .9, 4), matChip, 0, 1.2, 2));
  gImu.add(M(box(2.5, 2.5, 20.3), matChip, -6, -2, 0));

  const gUs = grupo('Ultrasonido HC-SR04', 'Sensor real (PCB 45×20 mm, transductores Ø16×12 a 26 mm) bajo el mantelete, coaxial al cañón: aporta la distancia que decide el disparo.', grupoTilt);
  gUs.position.set(0, -22, 14);
  gUs.add(M(box(48, 24, 3), matCuerpo, 0, 1, -2.4));
  gUs.add(M(box(45, 20, 1.6), matPcbAzul));
  for (const px of [-13, 13]) {
    gUs.add(M(cil(8, 12, 40), matAcero, px, 0, 6.9, Math.PI / 2));
    gUs.add(M(cil(6.9, .8, 40), matMalla, px, 0, 13.2, Math.PI / 2));
  }
  gUs.add(M(box(10, 4, 3.4), matAcero, 0, -6, 2.5));
  gUs.add(M(box(10, 2.5, 2.5), matChip, 0, -11, -1.8));

  const gEje = grupo('Eje central del láser', 'El eje hueco del racimo (previsto en el diseño original "para un futuro láser"): acá ya lo lleva. Remate de latón y óptica de salida.', grupoTilt);
  gEje.add(M(cil(5.5, 92, 32), matTubo, 0, 0, 64, Math.PI / 2));
  gEje.add(M(cil(4, 7), matLaton, 0, 0, 111, Math.PI / 2));
  gEje.add(M(cil(2.6, 1.4), matLente, 0, 0, 115, Math.PI / 2));

  // ------------------------------ SPIN -------------------------------------
  grupoTilt.add(grupoSpin);
  const gGat = grupo('Racimo gatling', 'Seis tubos en círculo de pernos (diseño original) alrededor del eje del láser, con placa trasera y freno de boca. En el demo gira de verdad al disparar.', grupoSpin);
  gGat.add(M(cil(15, 8, 48), matCuerpo, 0, 0, 22, Math.PI / 2));
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    gGat.add(M(cil(3.4, 78, 24), matTubo, 9.5 * Math.sin(a), 9.5 * Math.cos(a), 65, Math.PI / 2));
  }
  gGat.add(M(tubo(13.5, 4, 36), matCuerpo, 0, 0, 42, Math.PI / 2));
  gGat.add(M(tubo(13.5, 4, 36), matCuerpo, 0, 0, 84, Math.PI / 2));
  const freno = M(cil(13, 10, 36), matCuerpo, 0, 0, 105, Math.PI / 2);
  gGat.add(freno);
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    gGat.add(M(cil(2.8, 1.2, 18), matPanel, 9.5 * Math.sin(a), 9.5 * Math.cos(a), 110.3, Math.PI / 2));
  }
}

// ====================== LUCES / PISO / EXPLOTADO ============================
function setupLights() {
  escena.add(new THREE.HemisphereLight(0xbfd0e0, 0x14161a, 0.35));
  const key = new THREE.DirectionalLight(0xfff2e0, 2.6);
  key.position.set(280, 380, 220);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.left = key.shadow.camera.bottom = -300;
  key.shadow.camera.right = key.shadow.camera.top = 300;
  key.shadow.bias = -0.0004;
  escena.add(key);
  const fill = new THREE.DirectionalLight(0xcfe0ff, 0.55);
  fill.position.set(-340, 150, 150);
  escena.add(fill);
  const rim = new THREE.SpotLight(0xffffff, 4800, 0, Math.PI / 5, 0.4);
  rim.position.set(-70, 340, -420);
  escena.add(rim);
  const piso = new THREE.Mesh(new THREE.CircleGeometry(1000, 80),
    new THREE.MeshStandardMaterial({ color: 0x101216, roughness: .28, metalness: .75 }));
  piso.rotation.x = -Math.PI / 2;
  piso.receiveShadow = true;
  escena.add(piso);
}

const explotables = [];
function prepararExplotado() {
  const centro = new THREE.Vector3(0, 80, 25);
  torreta.updateWorldMatrix(true, true);
  torreta.traverse(o => {
    if (!o.userData?.explotable) return;
    const bb = new THREE.Box3().setFromObject(o);
    if (bb.isEmpty()) return;
    const c = bb.getCenter(new THREE.Vector3());
    const dir = c.clone().sub(centro);
    if (dir.length() < 1) dir.set(0, 1, 0);
    dir.normalize();
    const q = o.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
    explotables.push({ g: o, orig: o.position.clone(),
                       dir: dir.applyQuaternion(q),
                       dist: 28 + c.distanceTo(centro) * 0.55 });
  });
}
let tExp = 0, tExpDestino = 0;
function explodeView(t) {
  for (const e of explotables)
    e.g.position.copy(e.orig).addScaledVector(e.dir, e.dist * t);
}

// ======================= SELECCIÓN POR RAYCASTING ===========================
const ray = new THREE.Raycaster(), puntero = new THREE.Vector2();
let stash = [];
function deseleccionar() {
  for (const { mesh, mat } of stash) mesh.material = mat;
  stash = [];
  document.getElementById('info').style.display = 'none';
}
function seleccionar(g) {
  deseleccionar();
  g.traverse(m => {
    if (!m.isMesh) return;
    stash.push({ mesh: m, mat: m.material });
    const hl = m.material.clone();
    hl.emissive = new THREE.Color(0xf2c200);
    hl.emissiveIntensity = Math.max(hl.emissiveIntensity ?? 0, .45);
    m.material = hl;
  });
  document.getElementById('infoNombre').textContent = g.userData.nombre;
  document.getElementById('infoDesc').textContent = g.userData.desc;
  document.getElementById('info').style.display = 'block';
}
let downXY = null;
renderer.domElement.addEventListener('pointerdown', e => downXY = [e.clientX, e.clientY]);
renderer.domElement.addEventListener('pointerup', e => {
  if (!downXY || Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]) > 5) return;
  puntero.set(e.clientX / innerWidth * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(puntero, camara);
  const hit = ray.intersectObject(torreta, true)[0];
  if (!hit) return deseleccionar();
  let o = hit.object;
  while (o && !o.userData?.nombre) o = o.parent;
  if (o) seleccionar(o); else deseleccionar();
});
addEventListener('keydown', e => {
  if (e.key === 'Escape') deseleccionar();
  if (e.key.toLowerCase() === 'm') toggleDemo();
});

// ============================== MODO DEMO ===================================
let demo = false, panAct = 0, tiltAct = 0, fuegoHasta = 0, enfriado = 0, spinVel = 0;
const objetivo = new THREE.Group();
const orbe = M(new THREE.SphereGeometry(7, 28, 20),
  new THREE.MeshPhysicalMaterial({ color: 0xff7043, roughness: .3, clearcoat: .8,
    emissive: 0xff7043, emissiveIntensity: .25 }));
objetivo.add(orbe);
objetivo.add(M(new THREE.SphereGeometry(8.6, 20, 14),
  new THREE.MeshBasicMaterial({ color: 0xff7043, wireframe: true, transparent: true,
    opacity: .22, toneMapped: false })));
objetivo.visible = false;
escena.add(objetivo);
const haz = new THREE.Mesh(cil(0.7, 1, 10), matHaz);
haz.visible = false;
escena.add(haz);

function toggleDemo(force) {
  demo = force ?? !demo;
  objetivo.visible = demo;
  if (!demo) haz.visible = false;
  document.getElementById('bDemo').classList.toggle('on', demo);
  document.getElementById('bDemo').textContent = demo ? '■ Detener demo (M)' : '▶ Modo demo (M)';
  if (demo) { tExpDestino = 0; document.getElementById('sExplotar').value = 0; }
}

function updateDemo(dt, t) {
  if (!demo) {
    panAct += (0 - panAct) * Math.min(1, dt * 2);
    tiltAct += (0 - tiltAct) * Math.min(1, dt * 2);
    spinVel = Math.max(0, spinVel - dt * 8);
  } else {
    const ang = THREE.MathUtils.degToRad(55 * Math.sin(t * .42));
    const radio = 290 + 80 * Math.sin(t * .23 + 1);
    const alt = 160 + 80 * Math.sin(t * .31);
    objetivo.position.set(radio * Math.sin(ang), alt, radio * Math.cos(ang));
    const panDes = Math.atan2(objetivo.position.x, objetivo.position.z);
    const dH = Math.hypot(objetivo.position.x, objetivo.position.z);
    const tiltDes = Math.atan2(objetivo.position.y - 96, dH);
    panAct += (panDes - panAct) * Math.min(1, dt * 3.2);
    tiltAct += (tiltDes - tiltAct) * Math.min(1, dt * 3.2);
    const alineado = Math.abs(panDes - panAct) < .03 && Math.abs(tiltDes - tiltAct) < .03;
    if (alineado && t > enfriado) { fuegoHasta = t + .5; enfriado = t + 2.0; }
    const disparando = t < fuegoHasta;
    spinVel = THREE.MathUtils.clamp(spinVel + (disparando ? dt * 30 : -dt * 6), 1.2, 14);
    haz.visible = disparando;
    orbe.material.emissiveIntensity = disparando ? 2.2 : .25;
    if (disparando) {
      const boca = new THREE.Vector3(0, 0, 116).applyMatrix4(grupoTilt.matrixWorld);
      const fin = objetivo.position;
      const dirH = fin.clone().sub(boca);
      haz.position.copy(boca).addScaledVector(dirH, .5);
      haz.scale.set(1, dirH.length(), 1);
      haz.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirH.normalize());
    }
  }
  grupoSpin.rotation.z += spinVel * dt;
  grupoPan.rotation.y = THREE.MathUtils.clamp(panAct, -Math.PI, Math.PI);
  grupoTilt.rotation.x = -THREE.MathUtils.clamp(tiltAct, -.12, .6);
}

// ================================== UI ======================================
document.getElementById('sExplotar').addEventListener('input', e => {
  tExpDestino = +e.target.value / 100;
  if (tExpDestino > 0.01 && demo) toggleDemo(false);
});
document.getElementById('bDemo').addEventListener('click', () => toggleDemo());
const bRotar = document.getElementById('bRotar');
bRotar.addEventListener('click', () => {
  controles.autoRotate = !controles.autoRotate;
  bRotar.classList.toggle('on', controles.autoRotate);
});
document.getElementById('bReset').addEventListener('click', () => {
  camara.position.copy(CAM0.pos);
  controles.target.copy(CAM0.tgt);
});
document.querySelectorAll('#variantes div').forEach(d =>
  d.addEventListener('click', () => {
    document.querySelectorAll('#variantes div').forEach(x => x.classList.remove('on'));
    d.classList.add('on');
    matCuerpo.color.set(d.dataset.c);
  }));

// ================================ LOOP ======================================
buildProduct();
setupLights();
prepararExplotado();

const reloj = new THREE.Clock();
let tPrev = 0;
function animar() {
  requestAnimationFrame(animar);
  const t = reloj.getElapsedTime();
  const dt = Math.min(t - tPrev, .05);
  tPrev = t;

  tExp += (tExpDestino - tExp) * Math.min(1, dt * 4);
  if (Math.abs(tExp - tExpDestino) > 1e-4) explodeView(tExp);
  updateDemo(dt, t);

  controles.update();
  renderer.render(escena, camara);
}
addEventListener('resize', () => {
  camara.aspect = innerWidth / innerHeight;
  camara.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
animar();
</script>
