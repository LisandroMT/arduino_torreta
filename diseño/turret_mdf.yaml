# ============================================================================
#  turret_mdf.yaml — Maqueta de torreta en MDF para corte CNC/láser
#  Paneles planos encastrables + cañón de varillas (dowels) + articulación pan/tilt
#  TFI UTN FRSR 2026. Todas las cotas en mm.
# ============================================================================

material:
  thickness_mm: 3.0        # espesor del MDF (define ranuras de encastre)
  kerf_mm: 0.15            # holgura de corte (encastre justo)
  dogbones: true           # alivios en esquinas internas (para fresa CNC)
  dogbone_r_mm: 1.6

# --- Base estática: plataforma hexagonal + 3 patas paleta -------------------
base:
  hex_across_flats_mm: 150
  n_legs: 3
  leg_orient_deg: 180
  leg_length_mm: 64
  leg_width_mm: 34
  layers: 2                # capas de MDF apiladas (rigidez + altura)
  pan_bolt_dia_mm: 5       # bulón central de pan (M5)

# --- Cuerpo giratorio (caja de paneles encastrados, gira en pan) ------------
body:
  width_mm: 78             # ancho (Y)
  depth_mm: 86             # profundidad (X)
  back_height_mm: 80       # alto atrás (cuña)
  front_height_mm: 50      # alto al frente
  deck_clearance_mm: 2     # separación entre base y cubierta giratoria
  tilt_bolt_dia_mm: 4      # bulón del tilt (M4)
  trunnion_from_front_mm: 22  # eje de tilt: distancia desde el frente
  trunnion_height_mm: 40   # eje de tilt: altura sobre la cubierta

# --- Cañón gatling: varillas entre dos discos de MDF (bascula en tilt) ------
barrels:
  n_tubes: 6
  bolt_circle_dia_mm: 26
  dowel_dia_mm: 6          # varilla comercial (madera/aluminio)
  length_mm: 120
  disc_dia_mm: 40          # discos de MDF que sostienen las varillas
  disc_count: 3            # cantidad de discos a lo largo del cañón
  cheek_gap_mm: 56         # separación entre mejillas de la cuna

# --- Pose para el render (no afecta el corte) -------------------------------
pose:
  pan_deg: 25
  tilt_deg: 16

# --- Estilo del render ------------------------------------------------------
style:
  mdf_color: "#C8A165"     # MDF tono madera
  dowel_color: "#9DA0A4"   # varillas metálicas
  accent_color: "#F2C200"  # amarillo (grabado/pintado)
  background: "#3A3A3A"
